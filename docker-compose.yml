services:
    vectordb:
        hostname: vectordb
        image: ankane/pgvector
        ports:
            - '5432:5432'
        restart: always
        environment:
            - POSTGRES_DB=sentience_vectordb
            - POSTGRES_USER=superadmin
            - POSTGRES_PASSWORD=superadmin
            - POSTGRES_HOST_AUTH_METHOD=trust
        volumes:
            - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    db:
        image: postgres:13
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-superadmin}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-superadmin}
            POSTGRES_DB: ${POSTGRES_DB:-sentience}
        ports:
            - '${DB_PORT}:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-superadmin} -d ${POSTGRES_DB:-sentience}']
            interval: 10s
            timeout: 5s
            retries: 5
        restart: unless-stopped
volumes:
    postgres_data:
